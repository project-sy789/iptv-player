<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>📺 IPTV Player</title>
<meta name="description" content="ดูทีวีสด 12,000+ ช่อง — รองรับ Chromecast, ซับไตเติ้ล, เลือกความชัด">
<meta name="theme-color" content="#0c0c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IPTV">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="64x64" href="icons/favicon-64.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://iptv-org.github.io">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<style>
:root {
  --bg: #0c0c14;
  --surface: #151525;
  --surface2: #1e1e35;
  --border: #2a2a45;
  --text: #e8e8f0;
  --dim: #8888a0;
  --accent: #f0a030;
  --accent2: #e04040;
  --live: #30c860;
  --radius: 12px;
  --radius-sm: 8px;
  --sidebar-w: 240px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* === SIDEBAR === */
#sidebar{
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  z-index:10;
}
#sidebar .logo{
  padding:18px 16px 14px;
  font-size:20px;
  font-weight:700;
  color:var(--accent);
  letter-spacing:-0.5px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid var(--border);
}
#sidebar .logo .icon{font-size:28px}
#sidebar .logo .ver{font-size:10px;color:var(--dim);font-weight:400;margin-left:auto}
#sidebar .search-wrap{padding:12px}
#sidebar .search-wrap input{
  width:100%;
  padding:10px 14px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  font-size:13px;
  outline:none;
  transition:border-color .2s;
}
#sidebar .search-wrap input:focus{border-color:var(--accent)}
#sidebar .search-wrap input::placeholder{color:var(--dim)}
#sidebar nav{flex:1;overflow-y:auto;padding:6px 8px}
#sidebar nav .section{
  padding:10px 10px 4px;
  font-size:10px;
  font-weight:600;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:1.5px;
}
#sidebar nav button{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  text-align:left;
  padding:9px 12px;
  margin:1px 0;
  border:none;
  border-radius:var(--radius-sm);
  background:transparent;
  color:var(--dim);
  font-size:13px;
  cursor:pointer;
  transition:all .15s;
}
#sidebar nav button:hover{background:var(--surface2);color:var(--text)}
#sidebar nav button.on{background:var(--accent);color:#000;font-weight:600}
#sidebar nav button .fi{width:22px;text-align:center;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
#sidebar nav button .cnt{font-size:11px;margin-left:auto;opacity:.6}
#sidebar .footer{
  padding:12px;
  border-top:1px solid var(--border);
  font-size:11px;
  color:var(--dim);
  text-align:center;
  line-height:1.5;
}

/* === MAIN === */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}
#topbar{
  padding:14px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
#topbar .title{font-size:18px;font-weight:700}
#topbar .sub{font-size:13px;color:var(--dim);margin-left:4px}
#topbar .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--dim)}
#topbar .breadcrumb span{cursor:pointer;transition:color .15s}
#topbar .breadcrumb span:hover{color:var(--accent)}
#topbar .breadcrumb .sep{color:var(--border);cursor:default}
#topbar .spacer{flex:1}
#topbar .stats{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:6px}
#topbar .stats .dot{width:7px;height:7px;border-radius:50%;background:var(--live)}

/* === CONTENT === */
#content{flex:1;overflow-y:auto;padding-bottom:80px}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Row (Netflix-style horizontal scroll) */
.row-wrap{margin-bottom:28px}
.row-wrap .row-title{
  padding:0 24px;
  font-size:18px;
  font-weight:700;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.row-wrap .row-title .badge{
  font-size:12px;
  color:var(--dim);
  font-weight:400;
}
.row-scroll{
  display:flex;
  gap:10px;
  padding:0 24px;
  overflow-x:auto;
  scroll-behavior:smooth;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.row-scroll::-webkit-scrollbar{display:none}
.row-scroll .card{
  flex-shrink:0;
  width:200px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:all .2s;
}
.row-scroll .card:hover{
  border-color:var(--accent);
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(0,0,0,.4);
}
.row-scroll .card:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
  border-color:var(--accent);
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(0,0,0,.4),0 0 0 4px rgba(240,160,48,.3);
}
.row-scroll .card:focus-visible.playing{
  outline-color:var(--live);
  box-shadow:0 0 0 2px var(--live),0 0 0 6px rgba(48,200,96,.3);
}
.row-scroll .card.playing{border-color:var(--live);box-shadow:0 0 0 2px var(--live)}
.row-scroll .card .poster{
  height:112px;
  background:var(--surface2);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.row-scroll .card .poster img{
  width:100%;height:100%;object-fit:contain;
  background:var(--surface2);
}
.row-scroll .card .poster .ql-badge{
  position:absolute;top:8px;right:8px;
  padding:2px 8px;border-radius:4px;
  font-size:10px;font-weight:700;
  background:rgba(0,0,0,.7);color:var(--accent);
  border:1px solid rgba(255,255,255,.1);
}
.row-scroll .card .poster .live-dot{
  position:absolute;top:8px;left:8px;
  width:8px;height:8px;border-radius:50%;
  background:var(--live);
  box-shadow:0 0 6px var(--live);
}
.row-scroll .card .poster .status-dot{
  position:absolute;bottom:8px;left:8px;
  width:10px;height:10px;border-radius:50%;
  z-index:2;
}
.status-dot.alive{background:#22c55e;box-shadow:0 0 8px #22c55e}
.status-dot.dead{background:#ef4444;box-shadow:0 0 8px #ef4444}
.status-dot.testing{background:#f59e0b;animation:pulse 1s infinite}
.status-dot.unknown{background:#555}
.row-scroll .card .info{padding:10px 12px}
.row-scroll .card .info .name{
  font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.row-scroll .card .info .meta{
  font-size:11px;color:var(--dim);
  margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Grid view */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;padding:24px}
.grid-view .card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px;
  cursor:pointer;
  transition:all .15s;
  display:flex;align-items:center;gap:12px;
}
.grid-view .card:hover{border-color:var(--accent);transform:translateY(-1px)}
.grid-view .card.playing{border-color:var(--live);box-shadow:0 0 0 1px var(--live)}
.grid-view .card .thumb{
  width:48px;height:48px;border-radius:8px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.grid-view .card .detail{flex:1;min-width:0}
.grid-view .card .detail .nm{
  font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.grid-view .card .detail .mt{
  font-size:11px;color:var(--dim);margin-top:2px;
}
.grid-view .card .ql-badge{
  padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;
  background:#1e3a5f;color:#60a5fa;flex-shrink:0;
}
.grid-view .card .ql-badge.sd{background:#3a1e1e;color:#f87171}

/* Welcome / Country grid */
.welcome{padding:24px}
.welcome h2{font-size:24px;margin-bottom:8px}
.welcome p{color:var(--dim);margin-bottom:24px;line-height:1.6}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.country-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  cursor:pointer;
  transition:all .2s;
  text-align:center;
}
.country-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.country-card .flag{font-size:32px;font-weight:800;margin-bottom:8px;width:56px;height:56px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;color:var(--accent);border:2px solid var(--border)}
.country-card .name{font-size:14px;font-weight:600}
.country-card .count{font-size:12px;color:var(--dim);margin-top:4px}

/* Country code badge (replaces emoji flags) */
.cc-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:4px;
  background:var(--surface2);color:var(--accent);
  font-size:10px;font-weight:700;letter-spacing:0.5px;
  flex-shrink:0;
}
.cc-badge.na{color:var(--dim);background:transparent;border:1px dashed var(--border)}
.poster-cc{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--surface2),var(--surface));
}
.poster-cc span{
  font-size:28px;font-weight:800;color:var(--accent);opacity:.6;
}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--dim)}
.loading .emoji{font-size:48px;animation:pulse 1.5s infinite;margin-bottom:16px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Player bar (bottom) */
#player-bar{
  position:fixed;bottom:0;left:var(--sidebar-w);right:0;
  height:0;background:var(--surface);
  border-top:1px solid var(--border);
  transition:height .3s;
  display:flex;align-items:center;
  padding:0 20px;gap:14px;
  overflow:hidden;z-index:50;
}
#player-bar.on{height:62px}
#player-bar .thumb{
  width:40px;height:40px;border-radius:6px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
#player-bar .info{flex:1;min-width:0}
#player-bar .info .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#player-bar .info .sub{font-size:11px;color:var(--dim)}
#player-bar button{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border);
  padding:7px 14px;border-radius:6px;
  cursor:pointer;font-size:12px;transition:all .15s;
}
#player-bar button:hover{background:var(--border)}
#player-bar button.danger{background:var(--accent2);border-color:var(--accent2);color:#fff}
#player-bar button.danger:hover{opacity:.85}
#qualitySelect{max-width:70px!important;font-size:10px!important}
#overlayQuality{max-width:70px!important;font-size:10px!important}

/* Fullscreen player */
#player-overlay{
  position:fixed;inset:0;background:#000;z-index:200;
  display:none;flex-direction:column;
}
#player-overlay.on{display:flex}
#player-overlay .topbar{
  padding:10px 20px;display:flex;align-items:center;gap:12px;
  background:#0a0a0a;border-bottom:1px solid #222;
}
#player-overlay .topbar .tname{font-weight:600;font-size:14px;flex:1}
#player-overlay .topbar button{
  background:#222;color:#fff;border:none;
  padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;
}
#player-overlay .topbar button:hover{background:#444}
/* Subtitle/caption styling */
video::cue{background:rgba(0,0,0,.75);color:#fff;font-family:-apple-system,sans-serif;font-size:1.1em;text-shadow:0 1px 2px #000;line-height:1.4}
#player-overlay video{flex:1;width:100%;max-height:calc(100vh - 56px);background:#000}

/* Toast */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#000;padding:10px 24px;
  border-radius:20px;font-weight:600;font-size:13px;
  z-index:300;opacity:0;transition:opacity .3s;
}
.toast.show{opacity:1}

/* Login screen */
#login-overlay{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(135deg,#0a0a14,#151525,#0a0a14);
  display:flex;align-items:center;justify-content:center;
}
#login-overlay.hidden{display:none}
.login-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:40px;
  width:380px;
  max-width:90vw;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-box .icon{font-size:56px;margin-bottom:16px}
.login-box h2{font-size:22px;margin-bottom:8px;color:var(--accent)}
.login-box p{color:var(--dim);font-size:13px;margin-bottom:24px}
.login-box input{
  width:100%;padding:12px 16px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:15px;text-align:center;outline:none;
  transition:border-color .2s;letter-spacing:2px;
}
.login-box input:focus{border-color:var(--accent)}
.login-box input::placeholder{color:var(--dim);letter-spacing:0}
.login-box button{
  width:100%;margin-top:16px;padding:12px;
  border:none;border-radius:10px;
  background:var(--accent);color:#000;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;
}
.login-box button:hover{opacity:.85;transform:translateY(-1px)}
.login-box .error{color:var(--accent2);font-size:12px;margin-top:10px;min-height:18px}
.login-box .hint{color:var(--dim);font-size:11px;margin-top:16px}
#logout-btn{
  background:transparent;color:var(--dim);border:1px solid var(--border);
  padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;
  margin-left:8px;transition:all .15s;
}
#logout-btn:hover{color:var(--accent2);border-color:var(--accent2)}

/* Hamburger menu (mobile) */
#menu-toggle{
  display:none;position:fixed;top:10px;left:10px;z-index:60;
  width:40px;height:40px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:20px;cursor:pointer;
  align-items:center;justify-content:center;
}
#sidebar-overlay{display:none}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  :root{--sidebar-w:200px}
  #sidebar{width:200px}
  #player-bar{left:200px}
  .country-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .grid-view{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .row-wrap .row-title{font-size:16px}
  .row-scroll .card{width:170px}
  .row-scroll .card .poster{height:96px}
  #topbar{padding:10px 16px}
  #topbar .title{font-size:16px}
}
@media(max-width:768px){
  :root{--sidebar-w:0}
  #menu-toggle{display:flex}
  #sidebar{
    position:fixed;left:-260px;top:0;bottom:0;width:260px;
    z-index:55;transition:left .25s;box-shadow:4px 0 20px rgba(0,0,0,.5);
  }
  #sidebar.open{left:0}
  #sidebar-overlay{
    display:none;position:fixed;inset:0;z-index:54;
    background:rgba(0,0,0,.5);
  }
  #sidebar-overlay.show{display:block}
  #main{margin-left:0}
  #player-bar{left:0;padding:0 10px;gap:8px}
  #player-bar.on{height:56px}
  #player-bar .thumb{width:34px;height:34px;font-size:18px}
  #player-bar .info .nm{font-size:12px}
  #player-bar .info .sub{font-size:10px}
  #player-bar button{padding:5px 10px;font-size:11px}
  #topbar{padding:8px 12px 8px 56px;gap:8px;flex-wrap:wrap}
  #topbar .breadcrumb{font-size:12px}
  #topbar .stats{font-size:11px}
  #topbar select{font-size:11px;padding:5px 8px}
  #topbar button{font-size:11px!important;padding:5px 10px!important}
  #search input{font-size:12px;padding:8px 10px}
  .country-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .country-card{padding:14px}
  .country-card .flag{width:44px;height:44px;font-size:24px}
  .country-card .name{font-size:12px}
  .country-card .count{font-size:11px}
  .grid-view{grid-template-columns:1fr;gap:6px;padding:12px}
  .grid-view .card{padding:10px}
  .row-wrap{margin-bottom:20px}
  .row-wrap .row-title{font-size:15px;padding:0 12px}
  .row-scroll{padding:0 12px;gap:8px}
  .row-scroll .card{width:150px}
  .row-scroll .card .poster{height:84px}
  .row-scroll .card .info{padding:8px 10px}
  .row-scroll .card .info .name{font-size:12px}
  .welcome{padding:16px}
  .welcome h2{font-size:18px}
  .welcome p{font-size:13px}
  .login-box{padding:28px 20px}
  .login-box .icon{font-size:44px}
  .login-box h2{font-size:20px}
  #player-overlay .topbar{padding:8px 12px}
  #player-overlay .topbar .tname{font-size:12px}
  #player-overlay .topbar button{font-size:11px;padding:6px 10px}
  #sidebar nav button{font-size:12px;padding:8px 10px}
  #sidebar .logo{font-size:17px;padding:14px 14px 10px}
}
@media(max-width:480px){
  .country-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .country-card{padding:12px}
  .country-card .flag{width:36px;height:36px;font-size:20px}
  .row-scroll .card{width:130px}
  .row-scroll .card .poster{height:72px}
  #topbar button{margin-left:0!important}
  #logout-btn{margin-left:0!important}
  .cc-badge{width:18px;height:18px;font-size:9px}
}

</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div class="icon">📺</div>
    <h2 id="loginTitle">เครื่องเล่น IPTV</h2>
    <p id="loginDesc">ใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
    <input type="password" id="loginPass" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="loginBtn" onclick="doLogin()">🔓 ปลดล็อค</button>
    <div class="error" id="loginError"></div>
    <div class="hint" id="loginHint">🔒 ป้องกัน · iptv-org</div>
  </div>
</div>

<!-- Mobile menu toggle -->
<button id="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<aside id="sidebar">
  <div class="logo"><span class="icon">📺</span>IPTV<span class="ver">iptv-org</span></div>
  <div class="search-wrap">
    <input type="text" placeholder="🔍 ค้นหาช่อง..." oninput="debounceSearch()" id="searchInput">
  </div>
  <nav id="nav">
    <div class="section" id="navSection">เมนู</div>
    <button class="on" onclick="goHome()" id="navHome">🏠 หน้าแรก</button>
    <div class="section" id="countrySection">ประเทศ</div>
    <div id="countryList"></div>
  </nav>
  <div class="footer">
    <span id="lastUpdate">Loading...</span><br>

  </div>

// ====== M3U PARSER ======
function parseM3U(text){
  const lines=text.split('\n'),entries=[];
  let i=0;
  while(i<lines.length){
    if(lines[i].trim().startsWith('#EXTINF:')){
      const extinf=lines[i].trim();i++;
      let url='';
      if(i<lines.length&&lines[i].trim()&&!lines[i].trim().startsWith('#'))url=lines[i].trim();
      entries.push({extinf,url});
    }else{i++}
  }
  return entries;
}
function extractInfo(e){
  const x=e.extinf;
  const nm=x.match(/,([^,\[\n]+?)(?:\s*\[.*?\])?\s*$/);
  const qm=x.match(/\((\d+p)\)/);
  const gm=x.match(/group-title="([^"]+)"/);
  const cm=x.match(/tvg-id="[^"]*\.([a-z]{2})@/);
  const lm=x.match(/tvg-logo="([^"]+)"/);
  return{
    name:nm?nm[1].trim():'Unknown',
    quality:qm?qm[1]:null,
    cat:gm?gm[1]:'Other',
    country:cm?cm[1].toUpperCase():null,
    logo:lm?lm[1]:null,
    geo:/\[Geo-blocked\]/i.test(x),
    not247:/\[Not 24\/7\]/i.test(x),
    url:e.url
  };
}

// ====== DATA LOADING ======
async function loadData(){
  let raw=null;
  try{
    const c=localStorage.getItem(CACHE_KEY),t=localStorage.getItem(CACHE_TS);
    if(c&&t&&Date.now()-parseInt(t)<CACHE_TTL){raw=c;$('lastUpdate').textContent='cached '+new Date(parseInt(t)).toLocaleTimeString()}
  }catch(e){}
  if(!raw){
    $('content').innerHTML='<div class="loading"><span class="emoji">📡</span>'+tn('downloading')+'</div>';
    try{
      const r=await fetch(M3U_URL);
      if(!r.ok)throw new Error('HTTP '+r.status);
      raw=await r.text();
      try{localStorage.setItem(CACHE_KEY,raw);localStorage.setItem(CACHE_TS,Date.now().toString())}catch(e){}
      $('lastUpdate').textContent='just now';
      $('updateTime').textContent='just now';
    }catch(e){
      $('content').innerHTML='<div class="loading"><span class="emoji">❌</span>Failed: '+esc(e.message)+'</div>';
      return;
    }
  }
  $('content').innerHTML='<div class="loading"><span class="emoji">⚙️</span>'+tn('parsing')+'</div>';
  await sleep(10);
  
  const entries=parseM3U(raw);
  ALL=entries.map(extractInfo);
  buildDB();
  goHome();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function buildDB(){
  DB={};COUNTRY_LIST=[];
  const ccMap={};
  for(const ch of ALL){
    const cc=ch.country||'??';
    if(!DB[cc])DB[cc]={flag:countryFlag(cc),categories:{}};
    if(!DB[cc].categories[ch.cat])DB[cc].categories[ch.cat]=[];
    DB[cc].categories[ch.cat].push(ch);
    ccMap[cc]=(ccMap[cc]||0)+1;
  }
  COUNTRY_LIST=Object.entries(ccMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([cc,n])=>({cc,flag:countryFlag(cc),count:n}));
  renderCountryList();
}

function renderCountryList(){
  const q=($('searchInput').value||'').toLowerCase();
  let list=COUNTRY_LIST;
  if(q)list=list.filter(c=>c.cc.toLowerCase().includes(q));
  
  let html='';
  for(const c of list){
    const on=currentView==='country'&&currentCountry===c.cc;
    html+=`<button class="${on?'on':''}" onclick="goCountry('${c.cc}')">
      <span class="fi">${c.flag||'??'}</span>${countryName(c.cc)}
      <span class="cnt">${c.count}</span></button>`;
  }
  $('countryList').innerHTML=html;
}

  // 1. Verified Working ✅ (tested alive)
  const alive=getAliveChannels(20);
  if(alive.length>=5){
    html+=renderRow(tn('aliveRow'),tn('aliveSub'),alive);
  }

  // 3. Featured (high quality, broader criteria)
  const featured=ALL.filter(c=>c.quality&&parseInt(c.quality)>=720).slice(0,25);
  if(featured.length>=5){
    html+=renderRow(tn('featRow'),tn('featSub'),featured);
  }

  // 4. Popular categories with live channels
  const popularCats=['Sports','News','Entertainment','Music','Movies','Kids','Documentary'];
  for(const cat of popularCats){
    const chs=getCatChannels(cat,25);
    if(chs.length>=4){
      // Prefer alive channels first
      chs.sort((a,b)=>getStatus(a)==='alive'?-1:getStatus(b)==='alive'?1:0);
      html+=renderRow('📺 '+cat,chs.length+' channels',chs);
    }
  }

  // 5. Remaining top categories
  const topCats=getTopCategories(8);
  for(const [cat,chs] of topCats){
    if(popularCats.includes(cat))continue;
    html+=renderRow('📂 '+cat,chs.length+' channels',chs.slice(0,25));
  }
  
  $('content').innerHTML=html;
  setTimeout(autoTestVisible,800);

function getCatChannels(cat,max){
  const r=[];for(const ch of ALL){if(ch.cat===cat){r.push(ch);if(r.length>=max)break}}return r;

// 🔧 Migration helper: old data used array indices; new data uses URL hashes
function _migratePlays(){
  try{
    const raw=JSON.parse(localStorage.getItem('iptv_plays')||'{}');
    const keys=Object.keys(raw);
    if(keys.length>0&&keys.every(k=>/^\d+$/.test(k))){
      // Convert old index-based to hash-based
      const n={};
      for(const [idx,cnt] of Object.entries(raw)){
        const i=parseInt(idx);
        if(i<ALL.length&&ALL[i]&&ALL[i].url){
          n[urlHash(ALL[i].url)]=cnt;
        }
      }
      return n;
    }
    return raw;
  }catch(e){return{}}
}
function _migrateRecent(){
  try{
    const raw=JSON.parse(localStorage.getItem('iptv_recent')||'{}');
    const keys=Object.keys(raw);
    if(keys.length>0&&keys.every(k=>/^\d+$/.test(k))){
      const n={};
      for(const [idx,ts] of Object.entries(raw)){
        const i=parseInt(idx);
        if(i<ALL.length&&ALL[i]&&ALL[i].url){
          const h=urlHash(ALL[i].url);
          const ch=ALL[i];
          n[h]={ts:ts, name:ch.name, country:ch.country, quality:ch.quality, cat:ch.cat, logo:ch.logo, url:ch.url};
        }
      }
      return n;
    }
    return raw;
  }catch(e){return{}}
}

function getMostPlayed(n){
  const plays=loadPlayCounts();
  // Build a fast hash→channel lookup
  const hashToCh={};
  for(const ch of ALL){if(ch.url)hashToCh[urlHash(ch.url)]=ch;}
  const sorted=Object.entries(plays).sort((a,b)=>b[1]-a[1]).slice(0,n);
  return sorted.map(([h,cnt])=>{
    const ch=hashToCh[h]||null;
    if(ch){ch._playCount=cnt;return ch;}
    return null;
  }).filter(Boolean);
}
function getMostPlayedChannels(){return loadPlayCounts();}

function getAliveChannels(n){
  const r=[];for(const ch of ALL){if(getStatus(ch)==='alive'){r.push(ch);if(r.length>=n)break}}return r;
}

function loadPlayCounts(){
  try{
    const raw=JSON.parse(localStorage.getItem('iptv_plays')||'{}');
    const keys=Object.keys(raw);
    // Auto-migrate old index-based data
    if(keys.length>0&&keys.every(k=>/^\d+$/.test(k)))return _migratePlays();
    return raw;
  }catch(e){return{}}
}
function savePlayCounts(plays){try{localStorage.setItem('iptv_plays',JSON.stringify(plays))}catch(e){}}
function recordPlay(idx){
  const ch=ALL[idx];
  if(!ch||!ch.url)return;
  const h=urlHash(ch.url);
  // Play count
  const plays=loadPlayCounts();
  plays[h]=(plays[h]||0)+1;
  savePlayCounts(plays);
  // Recently watched
  const recent=loadRecentWatches();
  recent[h]={ts:Date.now(), name:ch.name, country:ch.country, quality:ch.quality, cat:ch.cat, logo:ch.logo, url:ch.url};
  saveRecentWatches(recent);
}

function loadRecentWatches(){
  try{
    const raw=JSON.parse(localStorage.getItem('iptv_recent')||'{}');
    const keys=Object.keys(raw);
    if(keys.length>0&&keys.every(k=>/^\d+$/.test(k)))return _migrateRecent();
    return raw;
  }catch(e){return{}}
}
function saveRecentWatches(r){try{localStorage.setItem('iptv_recent',JSON.stringify(r))}catch(e){}}
function getRecentlyWatched(n){
  const recent=loadRecentWatches();
  // Build hash→channel lookup from ALL
  const hashToCh={};
  for(const ch of ALL){if(ch.url)hashToCh[urlHash(ch.url)]=ch;}
  const result=[];
  const entries=Object.entries(recent).sort((a,b)=>{
    const ta=typeof a[1]==='object'?a[1].ts:a[1];
    const tb=typeof b[1]==='object'?b[1].ts:b[1];
    return tb-ta;
  });
  for(const [h,data] of entries){
    if(result.length>=n)break;
    const ch=hashToCh[h];
    if(ch){result.push(ch);continue;}
    // Fallback: use stored metadata (channel may have been removed from M3U)
    if(data&&typeof data==='object'&&data.name){
      result.push({name:data.name, country:data.country, quality:data.quality, cat:data.cat, logo:data.logo, url:data.url||'', _stale:true});
    }
  }
  return result;
}
function clearRecentlyWatched(){
  try{localStorage.setItem('iptv_recent','{}')}catch(e){}
  goHome();
}

function getTopCategories(n){
  const counts={},samples={};
  for(const ch of ALL){
    counts[ch.cat]=(counts[ch.cat]||0)+1;
    if(!samples[ch.cat])samples[ch.cat]=[];
    if(samples[ch.cat].length<30)samples[ch.cat].push(ch);
  }
  return Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,n)
    .map(([cat])=>[cat,samples[cat]]);
}

function renderSearchResults(q){

  $('breadcrumb').innerHTML='<span onclick="goHome()">🏠 Home</span><span class="sep">›</span><span>🔍 "'+esc(q)+'"</span>';

function renderRowScroll(channels, playCounts){

    }

    // Click handler
    const clickHandler=ch._stale?`playUrl('${esc(ch.url||'')}')`:`play(${idx})`;
    
    h+=`<div class="${cls}" onclick="${clickHandler}" tabindex="0" onkeydown="if(event.key==='Enter')${clickHandler}">
      <div class="poster">

function playUrl(url){
  if(!url)return;

function initPlayer(ch){
  const video=$('video');
  if(hls){hls.destroy();hls=null}
  video.src='';
  resetQualityUI();
  
  // Show loading toast
  toast(tn('loading'));
  
  if(!ch.url){
    toast(tn('noUrl'));
    return;
  }
  
  if(Hls.isSupported()){
    hls=new Hls({enableWorker:false,lowLatencyMode:false});
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,(ev,data)=>{
      buildQualityUI(hls.levels);
      buildAudioUI(hls.audioTracks);
      buildSubtitleUI(hls.subtitleTracks);
      // Mark stream as alive
      const h=urlHash(ch.url);
      streamStatus[h]={status:'alive',time:Date.now()};
      saveStreamStatus();refreshStatusUI();
      video.play().then(()=>toast(tn('playing')))
        .catch(()=>toast(tn('tapStart')));
    });
    hls.on(Hls.Events.ERROR,(ev,data)=>{
      console.warn('HLS error:',data.type,data.details);
      if(data.fatal){
        hls.destroy();hls=null;
        // Mark as dead
        const h=urlHash(ch.url);
        streamStatus[h]={status:'dead',time:Date.now()};
        saveStreamStatus();refreshStatusUI();
        // Try direct play as fallback
        video.src=ch.url;
        video.play().catch(()=>{
          toast(tn('streamDead'));
          stop();
        });
      }
    });
  }else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src=ch.url;
    video.play().catch(()=>toast('⚠️ Tap to start'));
  }else{
    video.src=ch.url;
    video.play().catch(()=>toast('⚠️ Tap to start'));
  }
}

function resetQualityUI(){

function resetAudioUI(){

function buildQualityUI(levels){
  if(!levels||levels.length<2)return;
  let opts='<option value="-1">Auto</option>';
  const seen=new Set();
  levels.forEach((l,i)=>{
    const label=(l.height?l.height+'p':(l.bitrate?Math.round(l.bitrate/1000)+'k':'Lv'+i));
    if(!seen.has(label)){seen.add(label);opts+=`<option value="${i}">${label}</option>`}
  });
  ['qualitySelect','overlayQuality'].forEach(id=>{
    const s=$(id);s.innerHTML=opts;s.style.display='inline-block';
  });
}
function buildAudioUI(tracks){
  if(!tracks||tracks.length<2)return resetAudioUI();
  let opts='';
  tracks.forEach((t,i)=>{
    const lang=(t.lang||t.name||'').toUpperCase();
    const lbl=t.name||('Track '+i);
    opts+=`<option value="${i}">🔊 ${lang||lbl}</option>`;
  });
  ['audioSelect','overlayAudio'].forEach(id=>{
    const s=$(id);if(s){s.innerHTML=opts;s.style.display='inline-block';}
  });
}
function buildSubtitleUI(tracks){
  if(!tracks||!tracks.length)return resetSubtitleUI();
  const subs=tracks.filter(t=>t.type==='SUBTITLES'||!t.default);
  if(!subs.length)return resetSubtitleUI();
  ['ccBtn','overlayCcBtn'].forEach(id=>{
    const b=$(id);if(b){b.style.display='inline-block';b.title=tracks.map(t=>(t.lang||t.name||'?').toUpperCase()).join(', ');}
  });
}
function setAudioTrack(val){
  if(!hls)return;
  hls.audioTrack=parseInt(val);
  ['audioSelect','overlayAudio'].forEach(id=>{
    const s=$(id);if(s)s.value=val;
  });
  const t=hls.audioTracks[val];
  toast('🔊 Audio: '+((t&&t.lang)?t.lang.toUpperCase():val));
}
function toggleSubtitle(){
  if(!hls||!hls.subtitleTracks||!hls.subtitleTracks.length)return;
  if(hls.subtitleTrack>=0){
    hls.subtitleTrack=-1;
    hls.subtitleDisplay=false;
    ['ccBtn','overlayCcBtn'].forEach(id=>{const b=$(id);if(b)b.classList.remove('on');});
    toast(tn('subtitleOff'));
  }else{

    const t=hls.subtitleTracks[trackIdx];
    toast('💬 '+((t&&t.lang)?t.lang.toUpperCase():'ON'));

}
function setQuality(val){
  if(!hls)return;
  hls.nextLevel=parseInt(val);
  ['qualitySelect','overlayQuality'].forEach(id=>{

function toast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if($('player-overlay').classList.contains('on'))closeFullscreen();
    else if(currentChannel)stop();
  }
  if(e.ctrlKey&&e.key==='f'){$('searchInput').focus();e.preventDefault()}
  // D-pad / remote navigation
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.key)){
    const cards=document.querySelectorAll('.card[tabindex="0"]');
    if(!cards.length)return;
    const focused=document.activeElement;
    const idx=Array.from(cards).indexOf(focused);
    if(idx===-1&&e.key!=='Enter'){cards[0].focus();e.preventDefault();return}
    const cols=getComputedStyle(document.getElementById('grid')||cards[0].parentElement).gridTemplateColumns.split(' ').length||3;
    let next=idx;
    if(e.key==='ArrowRight')next=Math.min(idx+1,cards.length-1);
    else if(e.key==='ArrowLeft')next=Math.max(idx-1,0);
    else if(e.key==='ArrowDown')next=Math.min(idx+cols,cards.length-1);
    else if(e.key==='ArrowUp')next=Math.max(idx-cols,0);
    else if(e.key==='Enter'){
      // Simulate click on focused card
      if(focused&&focused.classList.contains('card'))focused.click();
      return;
    }
    if(next!==idx){cards[next].focus();cards[next].scrollIntoView({block:'nearest'});}
    e.preventDefault();
  }
});

async function refreshData(){

  try{
    const r=await fetch(M3U_URL,{cache:'no-cache'});

    const raw=await r.text();

    toast('❌ Refresh failed: '+e.message);
  }
}

var castSession=null;
window['__onGCastApiAvailable']=function(isAvailable){
  if(!isAvailable)return;
  const ctx=cast.framework.CastContext.getInstance();
  ctx.setOptions({
    receiverApplicationId:cast.framework.ReceiverApplicationId.DEFAULT_MEDIA_RECEIVER,
    autoJoinPolicy:chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
  });
  ctx.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED,e=>{
    castSession=e.session;
    updateCastUI();
    if(!castSession&&currentChannel){
      // Disconnected from cast, resume local playback
      initPlayer(currentChannel);
    }
  });
  // Show cast buttons
  $('castBtn').style.display='inline-block';
  $('overlayCastBtn').style.display='inline-block';
};

function updateCastUI(){
  const active=!!castSession;
  ['castBtn','overlayCastBtn'].forEach(id=>{
    const b=$(id);if(!b)return;
    b.textContent=active?tn('castConnected'):tn('cast');
    b.style.background=active?'var(--live)':'';
    b.style.color=active?'#000':'';
  });
}

async function toggleCast(){
  const ctx=cast.framework.CastContext.getInstance();
  if(castSession){
    ctx.endCurrentSession(true);
    castSession=null;
    updateCastUI();
  }else if(currentChannel){
    try{
      await ctx.requestSession();
      const session=ctx.getCurrentSession();
      if(session&&currentChannel){
        const mediaInfo=new chrome.cast.media.MediaInfo(currentChannel.url,'application/x-mpegURL');
        mediaInfo.metadata=new chrome.cast.media.GenericMediaMetadata();
        mediaInfo.metadata.title=currentChannel.name;
        mediaInfo.metadata.subtitle=currentChannel.cat;
        const req=new chrome.cast.media.LoadRequest(mediaInfo);
        req.autoplay=true;
        await session.loadMedia(req);
        castSession=session;
        updateCastUI();
        toast(tn('castOk'));
      }
    }catch(e){toast(tn('castFail'))}
  }
}

// ====== LOGIN ======
const PASS_HASH='ad95d5fa651ba86d8923fe1238d24a4f1988a752acfe426ac72ac7c04471bc17';
async function sha256(text){
  const enc=new TextEncoder().encode(text);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function isLoggedIn(){return sessionStorage.getItem('iptv_auth')==='1'}
async function doLogin(){
  const pass=$('loginPass').value;
  if(!pass){$('loginError').textContent=tn('loginEmpty');return}
  const hash=await sha256(pass);
  if(hash===PASS_HASH){
    sessionStorage.setItem('iptv_auth','1');
    $('login-overlay').classList.add('hidden');
    $('loginError').textContent='';
    if(!ALL.length)loadData();
    else goHome();
  }else{
    $('loginError').textContent=tn('loginErr');
    $('loginPass').value='';$('loginPass').focus();
  }
}
function doLogout(){
  sessionStorage.removeItem('iptv_auth');
  if(hls){hls.destroy();hls=null}
  $('video').src='';currentChannel=null;
  $('player-bar').classList.remove('on');
  $('player-overlay').classList.remove('on');
  $('login-overlay').classList.remove('hidden');
  $('loginPass').value='';$('loginError').textContent='';
  ALL=[];DB={};COUNTRY_LIST=[];
  $('content').innerHTML='<div class="loading"><span class="emoji">🔒</span>Locked</div>';
  $('chCount').textContent='—';
}

// ====== STREAM TESTING ======
const STREAM_KEY='iptv_stream_status';
var streamStatus={}; // {urlHash: {status:'alive'|'dead',time:timestamp}}
var testQueue=[];
var testing=false;

function loadStreamStatus(){
  try{streamStatus=JSON.parse(localStorage.getItem(STREAM_KEY)||'{}')}catch(e){streamStatus={}}
  // Clear statuses older than 24h
  const now=Date.now();
  for(const k of Object.keys(streamStatus)){
    if(now-streamStatus[k].time>86400000)delete streamStatus[k];
  }
}
function saveStreamStatus(){try{localStorage.setItem(STREAM_KEY,JSON.stringify(streamStatus))}catch(e){}}
function urlHash(url){let h=0;for(let i=0;i<Math.min(url.length,200);i++)h=((h<<5)-h)+url.charCodeAt(i)|0;return Math.abs(h).toString(36)}
function getStatus(ch){const s=streamStatus[urlHash(ch.url)];return s?s.status:'unknown'}

function testChannel(ch){
  const h=urlHash(ch.url);
  if(streamStatus[h]&&Date.now()-streamStatus[h].time<3600000)return; // tested within 1h
  
  streamStatus[h]={status:'testing',time:Date.now()};
  saveStreamStatus();
  refreshStatusUI();
  
  // Use fetch() to test connectivity — works for M3U8 URLs too (unlike <video> which only Safari supports)
  // For CORS-blocked URLs, fall back to video element (works on Safari / native HLS)
  const controller=new AbortController();
  const timeout=setTimeout(()=>{
    controller.abort();
    streamStatus[h]={status:'dead',time:Date.now()};
    saveStreamStatus();
    refreshStatusUI();
  },8000);
  
  fetch(ch.url, {signal:controller.signal, cache:'no-cache'})
    .then(r=>{
      clearTimeout(timeout);
      // Any response (even 404/500) means server is reachable — stream might work
      if(r.ok||r.status>0){
        streamStatus[h]={status:'alive',time:Date.now()};
      }else{
        streamStatus[h]={status:'dead',time:Date.now()};
      }
      saveStreamStatus();
      refreshStatusUI();
    })
    .catch(err=>{
      clearTimeout(timeout);
      // CORS errors (TypeError) mean the server is reachable but blocked
      // — stream likely works via HLS.js (video element bypasses CORS)
      if(err.name==='TypeError'&&err.message.includes('Failed to fetch')){
        // Try video element as fallback (works when CORS blocks fetch but video is fine)
        const tester=document.createElement('video');
        tester.muted=true;tester.volume=0;tester.style.display='none';
        tester.preload='metadata';
        const vt=setTimeout(()=>{
          tester.remove();
          streamStatus[h]={status:'dead',time:Date.now()};
          saveStreamStatus();
          refreshStatusUI();
        },6000);
        tester.onloadedmetadata=()=>{
          clearTimeout(vt);tester.remove();
          streamStatus[h]={status:'alive',time:Date.now()};
          saveStreamStatus();
          refreshStatusUI();
        };
        tester.onerror=()=>{
          clearTimeout(vt);tester.remove();
          streamStatus[h]={status:'dead',time:Date.now()};
          saveStreamStatus();
          refreshStatusUI();
        };
        document.body.appendChild(tester);
        tester.src=ch.url;
      }else{
        // Network error, DNS failure, timeout — truly dead
        streamStatus[h]={status:'dead',time:Date.now()};
        saveStreamStatus();
        refreshStatusUI();
      }
    });
}

function testChannels(channels,max=5){
  let tested=0;
  for(const ch of channels){
    if(tested>=max)break;
    const h=urlHash(ch.url);
    if(!streamStatus[h]||Date.now()-streamStatus[h].time>3600000){
      testChannel(ch);tested++;
    }
  }
}

function refreshStatusUI(){
  document.querySelectorAll('.status-dot').forEach(el=>{
    const h=el.dataset.hash;
    const s=streamStatus[h];
    if(s){el.className='status-dot '+s.status}
  });
}

function statusDot(ch){
  const h=urlHash(ch.url);
  const s=streamStatus[h];
  const cls=s?s.status:'unknown';
  return`<span class="status-dot ${cls}" data-hash="${h}" title="${cls==='alive'?'✅ Working':cls==='dead'?'❌ Dead':'⏳ Unknown'}"></span>`;
}

// Auto-test channels when browsing a category
function autoTestVisible(){
  const cards=document.querySelectorAll('.card');
  const toTest=[];
  cards.forEach(c=>{
    const onclick=c.getAttribute('onclick');
    if(!onclick)return;
    // Match play(N) or playUrl('...')
    let ch=null;
    const m1=onclick.match(/play\((\d+)\)/);
    if(m1){ch=ALL[parseInt(m1[1])];}
    else{
      const m2=onclick.match(/playUrl\('([^']+)'\)/);
      if(m2){
        // Find channel by URL
        ch=ALL.find(x=>x.url===m2[1])||null;
      }
    }
    if(ch&&getStatus(ch)==='unknown')toTest.push(ch);
  });
  if(toTest.length)testChannels(toTest,3);
}

function testVisibleChannels(){
  const cards=document.querySelectorAll('.card');
  const toTest=[];
  cards.forEach(c=>{
    const onclick=c.getAttribute('onclick');
    if(!onclick)return;
    const m1=onclick.match(/play\((\d+)\)/);
    if(m1){toTest.push(ALL[parseInt(m1[1])]);return;}
    const m2=onclick.match(/playUrl\('([^']+)'\)/);
    if(m2){
      const ch=ALL.find(x=>x.url===m2[1]);
      if(ch)toTest.push(ch);
    }
  });
  if(toTest.length){
    toast('📶 Testing '+toTest.length+' channels...');
    testChannels(toTest,10);
  }else{
    toast('No channels visible');
  }
}

// ── PWA Service Worker + อัปเดตอัตโนมัติ ──
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing)return;
    refreshing=true;
    // แจ้งผู้ใช้ก่อน reload
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#f0a030;color:#000;padding:14px 20px;text-align:center;font-weight:700;font-size:14px;cursor:pointer;animation:slideDown .3s ease';
    banner.textContent='✅ อัปเดตเรียบร้อย! แตะเพื่อรีเฟรช / Tap to refresh';
    banner.onclick=()=>window.location.reload();
    document.body.prepend(banner);
    setTimeout(()=>{
      banner.style.opacity='0';
      banner.style.transition='opacity .3s';
      setTimeout(()=>banner.remove(),300);
      window.location.reload();
    },3000);
  });

  navigator.serviceWorker.register('/iptv-player/sw.js',{scope:'/iptv-player/'}).then(reg=>{
    // ตรวจสอบอัปเดตทุกครั้งที่เปิด
    reg.addEventListener('updatefound',()=>{
      const newWorker=reg.installing;
      newWorker.addEventListener('statechange',()=>{
        if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
          // New version available — แจ้งเตือน
          const banner=document.createElement('div');
          banner.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:99999;background:var(--surface2);color:var(--accent);padding:12px 20px;border-radius:8px;text-align:center;font-weight:600;font-size:13px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);border:1px solid var(--accent);animation:slideUp .3s ease';
          banner.textContent='🔄 มีเวอร์ชันใหม่! อัปเดตเลย / New version — Update now';
          banner.onclick=()=>{
            banner.textContent='⏳ กำลังอัปเดต...';
            banner.onclick=null;
            newWorker.postMessage('SKIP_WAITING');
          };
          document.body.appendChild(banner);
          // ซ่อนหลัง 10 วิ
          setTimeout(()=>{
            banner.style.opacity='0';
            banner.style.transition='opacity .3s';
            setTimeout(()=>banner.remove(),300);
          },10000);
        }
      });
    });

    // ตรวจสอบอัปเดตทุก 30 นาที
    setInterval(()=>reg.update(),30*60*1000);
  }).catch(()=>{}); // fail silently — PWA optional
}
